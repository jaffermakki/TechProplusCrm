{% extends "base.html" %}
{% block title %}Add Customer{% endblock %}
{% block page_title %}Add Customer{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;">
  <form method="POST">
    {% include "_csrf.html" %}
    <div class="field"><label>Name</label><input type="text" name="name" required></div>
    <div class="field"><label>Phone</label><input type="text" name="phone"></div>
    <div class="field"><label>Email</label><input type="email" name="email"></div>
    <div class="field"><label>Notes</label><textarea name="notes" rows="3"></textarea></div>
    <button type="submit" class="btn btn-primary btn-block btn-lg">Add Customer</button>
  </form>
</div>
{% endblock %}

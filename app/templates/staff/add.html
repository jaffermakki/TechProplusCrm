{% extends "base.html" %}
{% block title %}Add Staff{% endblock %}
{% block page_title %}Add Staff{% endblock %}

{% block content %}
<div class="card" style="max-width:420px;">
  <form method="POST">
    {% include "_csrf.html" %}
    <div class="field"><label>Name</label><input type="text" name="name" required></div>
    <div class="field"><label>PIN (4+ digits)</label><input type="text" name="pin" inputmode="numeric" pattern="[0-9]*" required></div>
    <div class="field"><label>Role</label>
      <select name="role">{% for r in roles %}<option value="{{ r }}">{{ r }}</option>{% endfor %}</select>
    </div>
    <div class="field"><label>Location</label>
      <select name="location_id">
        <option value="">— Unassigned —</option>
        {% for loc in locations %}
        <option value="{{ loc.id }}">{{ loc.name }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary btn-block btn-lg">Add Staff Member</button>
  </form>
</div>
{% endblock %}
